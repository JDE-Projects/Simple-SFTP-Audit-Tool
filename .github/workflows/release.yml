name: Release
run-name: Release ${{ github.ref_name }}   # else the run is titled by the tagged commit's message
on:
  push:
    tags: ['v*']
jobs:
  release:
    uses: JDE-Projects/Build-Tools/.github/workflows/release.yml@50c6357e33a5c715e4f55df9e366c9600cca0943 # Build-Tools main (CI checks: ruff, import, pytest)
    permissions:
      id-token: write
      attestations: write
      contents: write
    with:
      app_name: SimpleSFTPAuditTool
      dist_subfolder: "Simple SFTP Audit Tool"
      python_version: "3.14"
      build_command: "Build_Simple_SFTP_Audit_Tool.bat"
      app_id: "3ABECDD8-628A-48BA-873B-83510A234269"
      entry_script: "simple_sftp_audit_tool.py"
